name: Deploy

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest -q

  deploy:
    needs: test
    runs-on: self-hosted
    steps:
      - name: Pull & rebuild
        run: cd /home/pi/LinkedInBot && git pull origin master && docker compose up -d --build

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6; do
            if docker compose -f /home/pi/LinkedInBot/docker-compose.yml ps --format json | grep -q '"running"'; then
              echo "Container is running"
              exit 0
            fi
            echo "Waiting... (attempt $i)"
            sleep 5
          done
          echo "Container failed to start"
          docker compose -f /home/pi/LinkedInBot/docker-compose.yml logs --tail=20
          exit 1
